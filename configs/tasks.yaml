# Downstream task suite (v1.4 plan)
tasks:
  # --- Trainable tasks (LoRA-One prompt construction) ---
  sst2:
    hf_train: glue
    hf_eval: glue
    hf_subset: sst2
    hf_fallback:
      - id: SetFit/sst2
    lm_eval_task: glue/sst2
    primary_metric: acc
    num_fewshot: 0
    split_train: train
    split_eval: validation
    eval_task: sst2
  rte:
    hf_train: super_glue
    hf_eval: super_glue
    hf_subset: rte
    hf_fallback:
      - id: nyu-mll/glue
        subset: rte
    lm_eval_task: super_glue/rte
    primary_metric: acc
    num_fewshot: 0
    split_train: train
    split_eval: validation
    eval_task: rte
  boolq:
    hf_train: super_glue
    hf_eval: super_glue
    hf_subset: boolq
    hf_fallback:
      - id: google/boolq
    lm_eval_task: super_glue/boolq
    primary_metric: acc
    num_fewshot: 0
    split_train: train
    split_eval: validation
    eval_task: boolq

  # Math training (eval is GSM8K via lm-eval)
  metamath:
    hf_train: meta-math/MetaMathQA
    hf_eval: meta-math/MetaMathQA
    lm_eval_task: gsm8k
    primary_metric: exact_match
    split_train: train
    split_eval: train
    eval_from_train: true
    eval_size: 10000
    sequence_len: 2048
    num_fewshot: 0
    eval_task: gsm8k

  # Code training (eval is HumanEval via lm-eval)
  codefeedback:
    hf_train: m-a-p/CodeFeedback-Filtered-Instruction
    hf_eval: m-a-p/CodeFeedback-Filtered-Instruction
    lm_eval_task: humaneval
    primary_metric: pass@1
    split_train: train
    split_eval: train
    eval_from_train: true
    eval_size: 10000
    sequence_len: 2048
    num_fewshot: 0
    eval_task: humaneval

  # --- Eval-only tasks (no SFT data generated) ---
  gsm8k:
    eval_only: true
    hf_train: null
    hf_eval: null
    lm_eval_task: gsm8k
    primary_metric: exact_match
    split_train: null
    split_eval: null
    num_fewshot: 0
  humaneval:
    eval_only: true
    hf_train: null
    hf_eval: null
    lm_eval_task: humaneval
    primary_metric: pass@1
    num_fewshot: 0
    split_train: null
    split_eval: null

task_list:
  - sst2
  - rte
  - boolq
  - metamath
  - codefeedback

calib:
  num_samples: 512
  max_length: 512
